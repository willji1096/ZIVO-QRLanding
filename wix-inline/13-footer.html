<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<title>Footer</title>
<style>
  @font-face { font-family: 'Pretendard'; font-display: swap; }

  html { font-size: 17px; }
  @media (min-width: 768px) { html { font-size: 16px; } }

  html, body {
    overflow: hidden;
    word-break: keep-all;
    overflow-wrap: break-word;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "tnum";
  }
  h1, h2, h3 { text-wrap: balance; }
  p { text-wrap: pretty; }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand:      #1A5DF7;
    --ink:        #0A0F1C;
    --font-base:  'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  :focus { outline: none; }
  :focus-visible { outline: 2px solid #7CA8FF; outline-offset: 2px; }

  body { margin: 0; font-family: var(--font-base); background: var(--ink); }

  footer {
    background: var(--ink);
    border-top: 1px solid rgba(255,255,255,0.04);
    padding: 56px 0 40px;
  }

  .container {
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 24px;
  }
  @media (min-width: 768px) { .container { padding: 0 48px; } }

  .footer-top {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }
  @media (min-width: 768px) { .footer-top { flex-direction: row; justify-content: space-between; } }

  /* Brand */
  .brand-wrap { max-width: 420px; }

  .brand-logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .brand-logo img {
    height: 26px;
    width: auto;
    display: block;
  }
  .brand-logo-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--brand);
    letter-spacing: -0.01em;
  }

  /* SVG fallback logo — shown if image fails or not available */
  .logo-svg { display: none; }

  .brand-desc {
    margin-top: 12px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    line-height: 1.7;
  }

  /* Nav links */
  .nav-groups {
    display: flex;
    gap: 40px;
    font-size: 13px;
  }

  .nav-group { display: flex; flex-direction: column; gap: 10px; }

  .nav-group-title {
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    margin-bottom: 4px;
  }

  .nav-link {
    color: rgba(255,255,255,0.4);
    text-decoration: none;
    transition: color 0.2s ease;
  }
  .nav-link:hover { color: rgba(255,255,255,0.7); }

  /* Bottom */
  .footer-bottom {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }

  .legal-text {
    font-size: 12px;
    color: rgba(255,255,255,0.35);
    line-height: 1.7;
  }
  .legal-text .placeholder { color: rgba(255,255,255,0.25); }
  .legal-sep { margin: 0 8px; color: rgba(255,255,255,0.2); }

  .copyright {
    margin-top: 8px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>

<footer>
  <div class="container">

    <div class="footer-top">
      <!-- Brand -->
      <div class="brand-wrap">
        <div class="brand-logo">
          <!-- ZIVO 로고 — 텍스트 fallback 사용 (SVG 로고 파일 경로 확정 후 img로 교체) -->
          <span style="font-size:20px;font-weight:900;color:#fff;letter-spacing:-0.03em;">ZIVO</span>
          <span class="brand-logo-text">QR</span>
        </div>
        <p class="brand-desc">
          ZIVO는 외국인 관광객과 한국 매장을 연결하는 K-관광 플랫폼입니다. QR 오더로 언어 장벽 없이 외국인 손님을 받으세요.
        </p>
      </div>

      <!-- Nav -->
      <div class="nav-groups">
        <div class="nav-group">
          <span class="nav-group-title">서비스</span>
          <a href="#solution" target="_top" class="nav-link">서비스 소개</a>
          <a href="#features" target="_top" class="nav-link">주요 기능</a>
          <a href="#how-it-works" target="_top" class="nav-link">도입 과정</a>
        </div>
        <div class="nav-group">
          <span class="nav-group-title">고객지원</span>
          <a href="#faq" target="_top" class="nav-link">FAQ</a>
          <a href="#cta" target="_top" class="nav-link">도입 문의</a>
          <a href="#" target="_top" class="nav-link">이용약관</a>
          <a href="#" target="_top" class="nav-link">개인정보처리방침</a>
        </div>
      </div>
    </div>

    <div class="footer-bottom">
      <p class="legal-text">
        (주)글로벌알파미디어 · 대표: <span class="placeholder">변경필요</span>
        <span class="legal-sep">|</span>
        사업자등록번호: <span class="placeholder">변경필요</span>
        <span class="legal-sep">|</span>
        주소: 서울특별시 <span class="placeholder">변경필요</span>
      </p>
      <p class="copyright">&copy; 2025 Global Alpha Media Inc. All rights reserved.</p>
    </div>

  </div>
</footer>

</body>
</html>
<!-- 권장 iframe 높이: 데스크톱 ~280px / 모바일 ~360px -->

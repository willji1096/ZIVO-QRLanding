<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<title>QR Showcase</title>
<style>
  @font-face { font-family: 'Pretendard'; font-display: swap; }

  html { font-size: 17px; }
  @media (min-width: 768px) { html { font-size: 16px; } }

  html, body {
    overflow: hidden;
    word-break: keep-all;
    overflow-wrap: break-word;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "tnum";
  }
  h1, h2, h3 { text-wrap: balance; }
  p { text-wrap: pretty; }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand:      #1A5DF7;
    --accent-blue:#7CA8FF;
    --slate-900:  #0F172A;
    --slate-600:  #475569;
    --slate-500:  #64748B;
    --slate-400:  #94A3B8;
    --slate-50:   #F8FAFC;
    --font-base:  'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --ease-expo:  cubic-bezier(0.22, 1, 0.36, 1);
  }

  :focus { outline: none; }
  :focus-visible { outline: 2px solid var(--accent-blue); outline-offset: 2px; }

  body { margin: 0; font-family: var(--font-base); background: var(--slate-50); }

  .section {
    padding: 80px 0;
    background: var(--slate-50);
    overflow: hidden;
  }
  @media (min-width: 768px) { .section { padding: 112px 0; } }

  .container {
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 24px;
  }
  @media (min-width: 768px) { .container { padding: 0 48px; } }

  /* Intro */
  .intro {
    text-align: center;
    margin-bottom: 48px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.6s var(--ease-expo), transform 0.6s var(--ease-expo);
  }
  @media (min-width: 768px) { .intro { margin-bottom: 64px; } }
  .intro.in-view { opacity: 1; transform: translateY(0); }

  .eyebrow {
    font-size: 11px;
    font-weight: 700;
    color: var(--slate-400);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .heading {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 800;
    color: var(--slate-900);
    line-height: 1.05;
    letter-spacing: -0.025em;
  }

  .sub {
    margin-top: 24px;
    font-size: 15px;
    font-weight: 500;
    color: var(--slate-500);
    max-width: 480px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.7;
  }
  @media (min-width: 768px) { .sub { font-size: 17px; } }

  /* Image */
  .showcase-img-wrap {
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 30px 60px -20px rgba(15,23,42,0.2), 0 0 0 1px rgba(15,23,42,0.05);
    aspect-ratio: 16/9;
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.7s var(--ease-expo), transform 0.7s var(--ease-expo);
  }
  .showcase-img-wrap.in-view { opacity: 1; transform: translateY(0); }
  .showcase-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* Color chips */
  .color-chips {
    margin-top: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    max-width: 768px;
    margin-left: auto;
    margin-right: auto;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s var(--ease-expo) 0.2s, transform 0.5s var(--ease-expo) 0.2s;
  }
  @media (min-width: 768px) { .color-chips { margin-top: 56px; gap: 20px; } }
  .color-chips.in-view { opacity: 1; transform: translateY(0); }

  .chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .chip-swatch {
    width: 72px;
    height: 72px;
    border-radius: 16px;
    transition: transform 0.3s ease;
  }
  @media (min-width: 768px) { .chip-swatch { width: 104px; height: 104px; } }
  .chip:hover .chip-swatch { transform: scale(1.05); }

  .chip-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--slate-600);
    text-align: center;
    line-height: 1.3;
  }
  @media (min-width: 768px) { .chip-name { font-size: 13px; } }

  .footnote {
    margin-top: 40px;
    text-align: center;
    font-size: 13px;
    color: var(--slate-500);
    font-weight: 500;
  }

  @media (prefers-reduced-motion: reduce) {
    .intro, .showcase-img-wrap, .color-chips { opacity: 1 !important; transform: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<section class="section" id="qr-showcase">
  <div class="container">

    <div class="intro" id="qs-intro">
      <p class="eyebrow">Sticker — 10 Colors</p>
      <h2 class="heading">매장 분위기에 자연스럽게 녹아드는 컬러도 준비되어 있어요.</h2>
      <p class="sub">한정식엔 네이비, 카페엔 크림, 모던 매장엔 차콜. 테이블 위 인테리어 소품처럼 어울리는 톤으로.</p>
    </div>

    <div class="showcase-img-wrap" id="qs-img">
      <img src="https://zivo-qrlanding.netlify.app/images/qr-showcase.jpg"
           alt="ZIVO QR 스탠드 10가지 색상 쇼케이스"
           loading="lazy">
    </div>

    <div class="color-chips" id="qs-chips">

      <div class="chip">
        <div class="chip-swatch" style="background-color:#1A5DF7; box-shadow: 0 8px 20px rgba(15,23,42,0.14);" aria-label="Signal Blue"></div>
        <span class="chip-name">Signal Blue</span>
      </div>

      <div class="chip">
        <div class="chip-swatch" style="background-color:#1E3A8A; box-shadow: 0 8px 20px rgba(15,23,42,0.14);" aria-label="Deep Navy"></div>
        <span class="chip-name">Deep Navy</span>
      </div>

      <div class="chip">
        <div class="chip-swatch" style="background-color:#722F37; box-shadow: 0 8px 20px rgba(15,23,42,0.14);" aria-label="Wine"></div>
        <span class="chip-name">Wine</span>
      </div>

      <div class="chip">
        <div class="chip-swatch" style="background-color:#2F5A3A; box-shadow: 0 8px 20px rgba(15,23,42,0.14);" aria-label="Deep Green"></div>
        <span class="chip-name">Deep Green</span>
      </div>

      <div class="chip">
        <div class="chip-swatch" style="background-color:#64748B; box-shadow: 0 8px 20px rgba(15,23,42,0.14);" aria-label="Gray"></div>
        <span class="chip-name">Gray</span>
      </div>

      <div class="chip">
        <div class="chip-swatch" style="background-color:#FFFFFF; box-shadow: 0 0 0 1px rgba(15,23,42,0.08), 0 6px 16px rgba(15,23,42,0.06);" aria-label="Pure White"></div>
        <span class="chip-name">Pure White</span>
      </div>

    </div>

    <p class="footnote">*실제 제작·배송 모두 <strong style="color:#0F172A;">도입비용 0원에 포함</strong>됩니다.</p>

  </div>
</section>

<script>
(function () {
  if (!('IntersectionObserver' in window)) {
    document.querySelectorAll('#qs-intro, #qs-img, #qs-chips').forEach(function (el) { el.classList.add('in-view'); });
    return;
  }
  var io = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) {
        e.target.classList.add('in-view');
        io.unobserve(e.target);
      }
    });
  }, { rootMargin: '0px 0px -8% 0px', threshold: 0.08 });

  document.querySelectorAll('#qs-intro, #qs-img, #qs-chips').forEach(function (el) { io.observe(el); });
  setTimeout(function () {
    document.querySelectorAll('#qs-intro, #qs-img, #qs-chips').forEach(function (el) {
      if (!el.classList.contains('in-view')) el.classList.add('in-view');
    });
  }, 900);
})();
</script>

</body>
</html>
<!-- 권장 iframe 높이: 데스크톱 ~820px / 모바일 ~1000px -->
